<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>员工寄语 · 振邦20周年</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="nav">
  <div class="nav-brand">
    <span class="brand-logo">振邦</span>
    <span class="brand-text">20周年庆典</span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">首页</a></li>
    <li><a href="history.html">发展历程</a></li>
    <li><a href="vote_standalone.html">评选投票</a></li>
    <li><a href="lucky.html">幸运抽奖</a></li>
    <li><a href="message.html" class="active">员工寄语</a></li>
  </ul>
  <div class="nav-toggle" onclick="toggleNav()">☰</div>
</nav>

<div class="page-hero">
  <div class="section-tag">💌 寄语留声</div>
  <h1>员工寄语墙</h1>
  <p>写下你的心声，留下属于你与振邦的故事</p>
</div>

<section class="message-section">
  <div class="container">

    <!-- 留言表单 -->
    <div class="message-form-box">
      <h3>✍️ 写下你的寄语</h3>
      <div class="form-row">
        <label>你的姓名 *</label>
        <input type="text" id="msg-name" placeholder="请输入你的姓名">
      </div>
      <div class="form-row">
        <label>部门/岗位</label>
        <input type="text" id="msg-dept" placeholder="例如：施工部 / 项目管理">
      </div>
      <div class="form-row">
        <label>入职年份</label>
        <input type="text" id="msg-year" placeholder="例如：2010">
      </div>
      <div class="form-row">
        <label>寄语内容 *</label>
        <textarea id="msg-content" placeholder="写下你对振邦的祝福、感谢、期望，或你与振邦之间难忘的故事...&#10;&#10;字数限制：200字以内"></textarea>
      </div>
      <div class="form-submit">
        <button class="btn-msg" onclick="submitMessage()">发布寄语 💬</button>
      </div>
    </div>

    <!-- 寄语墙 -->
    <div class="messages-wall">
      <h3>💌 寄语墙 <span id="msg-count" style="font-size:14px;color:var(--text-muted)">（共 0 条）</span></h3>
      <div class="messages-grid" id="messages-grid">
      </div>
    </div>

  </div>
</section>

<!-- 发布成功弹窗 -->
<div class="modal-overlay" id="msg-modal">
  <div class="modal">
    <div style="font-size:56px;margin-bottom:12px">💌</div>
    <h3>寄语发布成功！</h3>
    <p style="color:var(--text-muted);margin:12px 0 24px;font-size:14px">你的心声已留在振邦20周年寄语墙上，谢谢你！</p>
    <button class="btn-modal" onclick="closeModal('msg-modal')">好的，继续浏览</button>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <p>© 2026 广西振邦建设工程有限公司 · 成立二十周年庆典</p>
    </div>
  </div>
</footer>

<script src="main.js"></script>
<script>
// 寄语列表（初始为空）
let MESSAGES = [];

function renderMessages() {
  const grid = document.getElementById('messages-grid');
  const count = document.getElementById('msg-count');
  count.textContent = `（共 ${MESSAGES.length} 条）`;
  grid.innerHTML = MESSAGES.map(m => {
    const initial = m.name.slice(-1);
    return `
    <div class="message-card">
      <div class="message-time">${m.time}</div>
      <div class="message-quote">"</div>
      <div class="message-text">${escapeHtml(m.content)}</div>
      <div class="message-author">
        <div class="author-avatar">${initial}</div>
        <div>
          <div class="author-name">${escapeHtml(m.name)}</div>
          <div class="author-dept">${escapeHtml(m.dept)}${m.year ? ' · ' + m.year + '年入职' : ''}</div>
        </div>
      </div>
    </div>
    `;
  }).join('');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function submitMessage() {
  const name = document.getElementById('msg-name').value.trim();
  const dept = document.getElementById('msg-dept').value.trim();
  const year = document.getElementById('msg-year').value.trim();
  const content = document.getElementById('msg-content').value.trim();
  if(!name) { alert('请输入你的姓名！'); return; }
  if(!content) { alert('请填写寄语内容！'); return; }
  if(content.length > 200) { alert('寄语内容不超过200字！'); return; }

  const now = new Date();
  const dateStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
  MESSAGES.unshift({name, dept: dept||'振邦员工', year, content, time:dateStr});
  renderMessages();
  // 清空表单
  document.getElementById('msg-name').value = '';
  document.getElementById('msg-dept').value = '';
  document.getElementById('msg-year').value = '';
  document.getElementById('msg-content').value = '';
  document.getElementById('msg-modal').classList.add('show');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

renderMessages();
</script>
</body>
</html>
