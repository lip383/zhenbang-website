<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票统计 · 振邦20周年</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="nav">
  <div class="nav-brand">
    <span class="brand-logo">振邦</span>
    <span class="brand-text">20周年庆典</span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">首页</a></li>
    <li><a href="history.html">发展历程</a></li>
    <li><a href="vote_standalone.html">评选投票</a></li>
    <li><a href="lucky.html">幸运抽奖</a></li>
    <li><a href="message.html">员工寄语</a></li>
    <li><a href="stats_standalone.html" class="active">📊 投票统计</a></li>
  </ul>
  <div class="nav-toggle" onclick="toggleNav()">☰</div>
</nav>

<div class="page-hero">
  <div class="section-tag">📊 实时统计</div>
  <h1>投票结果统计</h1>
  <p id="stats-time">正在加载数据...</p>
</div>

<section class="stats-section">
  <div class="container">

    <!-- 统计概览 -->
    <div class="stats-overview">
      <div class="stat-card">
        <div class="stat-number" id="total-votes">0</div>
        <div class="stat-label">总投票数</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="total-voters">0</div>
        <div class="stat-label">参与投票人数</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="participation-rate">0%</div>
        <div class="stat-label">参与度</div>
      </div>
    </div>

    <!-- 最佳员工排行 -->
    <div class="ranking-section">
      <h2>🌟 最佳员工 TOP 5</h2>
      <div id="best-employee-ranking" class="ranking-list"></div>
    </div>

    <!-- 优秀团队排行 -->
    <div class="ranking-section">
      <h2>👥 优秀团队 TOP 5</h2>
      <div id="best-team-ranking" class="ranking-list"></div>
    </div>

    <!-- 操作按钮 -->
    <div style="text-align: center; margin-top: 40px;">
      <button onclick="location.href='vote_standalone.html'" class="btn-back">← 返回投票</button>
      <button onclick="refreshStats()" class="btn-refresh">🔄 刷新统计</button>
      <button onclick="exportData()" class="btn-export">💾 导出数据</button>
    </div>

    <!-- 详细数据表（已隐藏） -->
    <!-- 
    <div class="details-section" style="margin-top: 40px;">
      <h3>📋 详细投票记录</h3>
      <div id="details-table" class="details-table"></div>
    </div>
    -->

  </div>
</section>

<script>
const VOTES_KEY = 'anniversary_votes';
const VOTED_USERS_KEY = 'anniversary_voted_users';

function getAllVotes() {
  const data = localStorage.getItem(VOTES_KEY);
  return data ? JSON.parse(data) : [];
}

function getStats() {
  const votes = getAllVotes();
  const stats = {
    total_votes: votes.length,
    best_employee: {},
    best_team: {},
    by_voter: {}
  };

  votes.forEach(vote => {
    if (vote.best_employee) {
      stats.best_employee[vote.best_employee] = (stats.best_employee[vote.best_employee] || 0) + 1;
    }
    if (vote.best_team) {
      stats.best_team[vote.best_team] = (stats.best_team[vote.best_team] || 0) + 1;
    }
    if (vote.voter) {
      stats.by_voter[vote.voter] = vote;
    }
  });

  return stats;
}

function renderRanking(data, elementId) {
  const container = document.getElementById(elementId);
  if (!data || Object.keys(data).length === 0) {
    container.innerHTML = '<div style="color: var(--text-muted); padding: 20px; text-align: center;">暂无投票数据</div>';
    return;
  }

  const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
  const maxVotes = sorted[0]?.[1] || 1;

  container.innerHTML = sorted.slice(0, 5).map((item, idx) => {
    const [name, votes] = item;
    const percentage = (votes / maxVotes) * 100;
    const medal = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'][idx] || '•';

    return `
      <div class="ranking-item">
        <div class="ranking-medal">${medal}</div>
        <div class="ranking-info">
          <div class="ranking-name">${name}</div>
          <div class="ranking-bar">
            <div class="ranking-bar-fill" style="width: ${percentage}%"></div>
          </div>
        </div>
        <div class="ranking-votes">${votes}票</div>
      </div>
    `;
  }).join('');
}

function renderDetails(votes) {
  const container = document.getElementById('details-table');
  if (votes.length === 0) {
    container.innerHTML = '<div style="color: var(--text-muted); padding: 20px; text-align: center;">暂无投票记录</div>';
    return;
  }

  container.innerHTML = `
    <table style="width: 100%; border-collapse: collapse;">
      <thead>
        <tr style="background: rgba(200, 162, 0, 0.1); border-bottom: 2px solid var(--gold);">
          <th style="padding: 12px; text-align: left; color: var(--gold);">投票人</th>
          <th style="padding: 12px; text-align: left; color: var(--gold);">最佳员工</th>
          <th style="padding: 12px; text-align: left; color: var(--gold);">优秀团队</th>
          <th style="padding: 12px; text-align: left; color: var(--gold);">投票时间</th>
        </tr>
      </thead>
      <tbody>
        ${votes.map((vote, idx) => `
          <tr style="border-bottom: 1px solid rgba(200, 162, 0, 0.1); ${idx % 2 === 0 ? 'background: rgba(20, 40, 70, 0.5);' : ''}">
            <td style="padding: 12px; color: #f0f4f8;">${vote.voter}</td>
            <td style="padding: 12px; color: #f0f4f8;">${vote.best_employee || '-'}</td>
            <td style="padding: 12px; color: #f0f4f8;">${vote.best_team || '-'}</td>
            <td style="padding: 12px; color: var(--text-muted); font-size: 12px;">${formatTime(vote.timestamp)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function formatTime(timestamp) {
  if (!timestamp) return '-';
  const date = new Date(timestamp);
  return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function updateStats() {
  const votes = getAllVotes();
  const stats = getStats();
  const totalVoters = 62; // 总员工数

  document.getElementById('total-votes').textContent = stats.total_votes;
  document.getElementById('total-voters').textContent = Object.keys(stats.by_voter).length;
  document.getElementById('participation-rate').textContent = Math.round((Object.keys(stats.by_voter).length / totalVoters) * 100) + '%';
  document.getElementById('stats-time').textContent = '最后更新: ' + new Date().toLocaleTimeString('zh-CN');

  renderRanking(stats.best_employee, 'best-employee-ranking');
  renderRanking(stats.best_team, 'best-team-ranking');
}

function refreshStats() {
  updateStats();
  alert('数据已刷新！');
}

function exportData() {
  const votes = getAllVotes();
  const stats = getStats();
  const exportObj = {
    export_time: new Date().toISOString(),
    total_votes: stats.total_votes,
    total_voters: Object.keys(stats.by_voter).length,
    best_employee_ranking: Object.entries(stats.best_employee)
      .sort((a, b) => b[1] - a[1])
      .map(([name, votes]) => ({ name, votes })),
    best_team_ranking: Object.entries(stats.best_team)
      .sort((a, b) => b[1] - a[1])
      .map(([name, votes]) => ({ name, votes })),
    detailed_votes: votes
  };

  const dataStr = JSON.stringify(exportObj, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json;charset=utf-8' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `vote_stats_${new Date().getTime()}.json`;
  link.click();
  alert('数据已导出！文件名: ' + link.download);
}

// 定时刷新统计（每 5 秒）
document.addEventListener('DOMContentLoaded', () => {
  updateStats();
  setInterval(updateStats, 5000);
});

function toggleNav() {
  // 移动端导航切换
}
</script>

<style>
:root {
  --gold: #c8a200;
  --text-muted: #8a9aaa;
  --card-bg: rgba(20, 40, 70, 0.8);
}

.stats-section {
  padding: 40px 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
}

.stats-overview {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.stat-card {
  background: var(--card-bg);
  border: 2px solid rgba(200, 162, 0, 0.2);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  transition: all 0.3s ease;
}

.stat-card:hover {
  border-color: var(--gold);
  transform: translateY(-4px);
}

.stat-number {
  font-size: 36px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 8px;
}

.stat-label {
  font-size: 14px;
  color: var(--text-muted);
}

.ranking-section {
  margin-bottom: 40px;
}

.ranking-section h2 {
  font-size: 20px;
  color: #f0f4f8;
  margin-bottom: 20px;
}

.ranking-list {
  background: var(--card-bg);
  border-radius: 12px;
  border: 2px solid rgba(200, 162, 0, 0.2);
  overflow: hidden;
}

.ranking-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  border-bottom: 1px solid rgba(200, 162, 0, 0.1);
}

.ranking-item:last-child {
  border-bottom: none;
}

.ranking-medal {
  font-size: 24px;
  min-width: 40px;
  text-align: center;
}

.ranking-info {
  flex: 1;
}

.ranking-name {
  color: #f0f4f8;
  font-weight: 600;
  margin-bottom: 8px;
}

.ranking-bar {
  height: 6px;
  background: rgba(200, 162, 0, 0.1);
  border-radius: 3px;
  overflow: hidden;
}

.ranking-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #d4b847);
  transition: width 0.3s ease;
}

.ranking-votes {
  color: var(--gold);
  font-weight: 700;
  min-width: 60px;
  text-align: right;
}

.btn-back, .btn-refresh, .btn-export {
  padding: 12px 24px;
  margin: 0 8px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-back {
  background: rgba(200, 162, 0, 0.2);
  color: var(--gold);
}

.btn-refresh, .btn-export {
  background: var(--gold);
  color: #0a1428;
}

.btn-back:hover {
  background: rgba(200, 162, 0, 0.3);
}

.btn-refresh:hover, .btn-export:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 24px rgba(200, 162, 0, 0.3);
}

.details-section {
  background: var(--card-bg);
  border: 2px solid rgba(200, 162, 0, 0.2);
  border-radius: 12px;
  padding: 24px;
}

.details-section h3 {
  color: #f0f4f8;
  margin-top: 0;
}

.details-table {
  overflow-x: auto;
}

@media (max-width: 768px) {
  .stats-overview {
    grid-template-columns: 1fr;
  }

  .btn-back, .btn-refresh, .btn-export {
    display: block;
    width: 100%;
    margin: 8px 0;
  }
}
</style>

</body>
</html>
