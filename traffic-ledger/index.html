    '批量添加立柱：<b>请点击起点</b> | 右键取消';
  document.getElementById('drawHint').classList.add('show');
  map.getContainer().style.cursor = 'crosshair';
  showToast('请点击立柱排列的起点', 'info');
}

function cancelBatchColumn() {
  batchColumnMode = false;
  batchColumnPoints = [];
  document.getElementById('drawHint').classList.remove('show');
  map.getContainer().style.cursor = '';
  drawMarkers.forEach(function(m) { map.removeLayer(m); });
  drawMarkers = [];
  if (drawTempLayer) { map.removeLayer(drawTempLayer); drawTempLayer = null; }
  showToast('已取消批量添加', 'info');
}

// 确认批量生成立柱
function confirmBatchColumn() {
  var countEl = document.getElementById('columnCount');
  if (!countEl) { cancelBatchColumn(); return; }
  var count = parseInt(countEl.value, 10);
  if (!count || count < 1 || count > 100) {
    showToast('请输入有效数量（1-100）', 'error');
    return;
  }
  var pts = batchColumnPoints;
  if (!pts || pts.length < 2) { cancelBatchColumn(); return; }
  createBatchColumns(pts[0].lat, pts[0].lng, pts[1].lat, pts[1].lng, count, '', '');
  cancelBatchColumn();
}

// 在起点和终点之间等距生成立柱
function createBatchColumns(startLat, startLng, endLat, endLng, count, templateName, templateRoad) {
  for (var i = 0; i < count; i++) {
    var t = count === 1 ? 0.5 : i / (count - 1);
    var lat = startLat + (endLat - startLat) * t;
    var lng = startLng + (endLng - startLng) * t;
    var newId = generateId();
    var num = (i + 1).toString().padStart(2, '0');
    facilities.push({
      id: newId,
      type: 'column',
      name: (templateName || '交通隔离立柱') + ' #' + num,
      road: templateRoad || '',
      lat: lat,
      lng: lng,
      status: 'active',
      attributes: {},
      notes: '',
      photos: []
    });
  }
  saveData();
  renderAllFacilities();
  renderFacilityList();
  updateStats();
  showToast('已批量添加 ' + count + ' 根隔离立柱', 'success');
}

function addDrawPoint(latlng) {
  if (drawMode !== 'point') return;

  var facility = {
    id: generateId(),
    type: 'sign_single',
    name: '',
    road: '',
    lat: latlng.lat,
    lng: latlng.lng,
    status: 'active',
    attributes: {},
    notes: ''
  };

  cancelDraw();

  facilities.push(facility);
  saveData();
  renderAllFacilities();
  renderFacilityList();
  updateStats();
  selectFacility(facility.id);
  showToast('请在右侧面板填写设施信息', 'info');
}

// ============================================================
// 绘制线状设施（护栏）
// ============================================================
function startDrawLine() {
  if (requirePerm('add', '绘制护栏')) return;
  if (drawMode === 'line') { cancelDraw(); return; }
  cancelDraw();
  drawMode = 'line';
  drawPoints = [];
  drawMarkers = [];
  if (drawTempLayer) { map.removeLayer(drawTempLayer); drawTempLayer = null; }

  // 检测是否有复制的线段模板
  if (clipboardFacility && TYPE_CONFIG[clipboardFacility.type] && TYPE_CONFIG[clipboardFacility.type].geometry === 'line') {
    pasteTemplate = clipboardFacility;
    showToast('已加载复制的「' + clipboardFacility.name + '」，请绘制线段', 'info');
  }

  // 鼠标移动时实时显示长度
  drawMouseMoveHandler = function(e) {
    if (drawMode !== 'line' || drawPoints.length === 0) return;
    var lastPt = drawPoints[drawPoints.length - 1];
    var dist = map.distance([lastPt.lat, lastPt.lng], e.latlng);
    var total = calcTotalLength(drawPoints);
    var hint = document.getElementById('drawHint');
    var segInfo = '';
    if (drawPoints.length >= 2) {
      var prevPt = drawPoints[drawPoints.length - 2];
      var segLen = Math.round(map.distance([prevPt.lat, prevPt.lng], [lastPt.lat, lastPt.lng]));
      segInfo = ' | 上段:' + segLen + '米';
    }
    // 保留输入框的值
    var inputVal = '';
    var inputEl = document.getElementById('targetLen');
    if (inputEl) inputVal = inputEl.value;

    hint.innerHTML =
      '节点:' + drawPoints.length +
      ' | 当前段:' + Math.round(dist) + '米' +
      segInfo +
      ' | 总长(含当前段):' + Math.round(total + dist) + '米' +
      ' | 目标长度:<input id="targetLen" type="number" min="1" value="' + inputVal + '" placeholder="输入米数" style="width:80px;padding:2px 4px;border-radius:3px;border:1px solid #aaa;margin:0 4px;">' +
      '<button onclick="event.stopPropagation();finishByLength()" style="padding:2px 8px;background:#2ecc71;color:#fff;border:none;border-radius:3px;cursor:pointer;">按长度完成</button>';
  };
  map.on('mousemove', drawMouseMoveHandler);

  var hint = document.getElementById('drawHint');
  hint.innerHTML = '请在地图上依次点击节点（每次点击后输入长度可精确控制）| 右键取消';
  hint.classList.add('show');

  var btn = document.getElementById('drawFinishBtn');
  if (btn) btn.style.display = 'block';

  map.getContainer().style.cursor = 'crosshair';
  map.doubleClickZoom.disable();
  showToast('点击地图放置节点，或输入目标长度后点「按长度完成」', 'info');
}

function addDrawLinePoint(latlng) {
  if (drawMode !== 'line') return;
  // 存储原始点击坐标（WGS-84）
  drawPoints.push({ lat: latlng.lat, lng: latlng.lng });

  // 把上一个"最后一个节点"恢复成普通样式（橙色）
  if (drawMarkers.length > 0) {
    var prevMarker = drawMarkers[drawMarkers.length - 1];
    prevMarker.setStyle({ fillColor: '#2980b9', radius: 5 });
    prevMarker.closeTooltip();
    prevMarker.unbindTooltip();
    prevMarker.off('click');
  }

  // 临时标记/线段显示坐标：根据当前底图转换
  var dLat = latlng.lat, dLng = latlng.lng;
  if (activeCoordSystem === COORD.GCJ02) {
    var gcj = wgs84ToGcj02(latlng.lng, latlng.lat);
    dLng = gcj[0]; dLat = gcj[1];
  }

  var marker = L.circleMarker([dLat, dLng], {
    radius: 8,
    fillColor: '#2ecc71',
    color: '#fff',
    weight: 2,
    fillOpacity: 0.95
  }).addTo(map);

  // 绿色最后一个节点：点击它完成绘制
  marker.bindTooltip('点击此处完成绘制', { direction: 'top', className: 'draw-finish-tooltip' });
  marker.on('click', function(e) {
    L.DomEvent.stopPropagation(e);
    if (drawPoints.length >= 2) {
      finishDrawLine();
    }
  });

  drawMarkers.push(marker);

  if (drawTempLayer) map.removeLayer(drawTempLayer);
  if (drawPoints.length >= 2) {
    // 始终用WGS-84
    var latlngs = drawPoints.map(function(p) {
      return [p.lat, p.lng];
    });
    drawTempLayer = L.polyline(latlngs, {
      color: '#2980b9',
      weight: 5,
      dashArray: null,
      opacity: 0.85
    }).addTo(map);
  }

  var hint = document.getElementById('drawHint');
  hint.textContent = '已添加 ' + drawPoints.length + ' 个节点 | 点击绿色节点完成绘制';
  if (drawPoints.length >= 2) {
    var dfb2 = document.getElementById('drawFinishBtn');
    if (dfb2) dfb2.textContent = '完成绘制 (' + drawPoints.length + '点)';
  }
}

function finishDrawLine() {
  if (drawMode !== 'line' || drawPoints.length < 2) {
    cancelDraw();
    if (drawPoints.length < 2) {
      showToast('至少需要2个点才能绘制线段', 'error');
    }
    return;
  }

  // 自动计算总长度
  var totalLen = calcTotalLength(drawPoints);
  if (totalLen > 0) {
    totalLen = Math.round(totalLen);
  }

  var facility = {
    id: generateId(),
    type: 'guardrail',
    name: '',
    road: '',
    coordinates: drawPoints.slice(),
    status: 'active',
    attributes: { length: totalLen ? (totalLen + 'm') : '' },
    notes: ''
  };

  // 如果有粘贴模板，自动填入复制的信息
  if (pasteTemplate) {
    facility.type = pasteTemplate.type;
    facility.name = pasteTemplate.name;
    facility.road = pasteTemplate.road;
    facility.status = pasteTemplate.status;
    facility.attributes = JSON.parse(JSON.stringify(pasteTemplate.attributes || {}));
    facility.attributes.length = totalLen ? (totalLen + 'm') : (facility.attributes.length || '');
    facility.notes = pasteTemplate.notes || '';
    facility.photos = pasteTemplate.photos ? pasteTemplate.photos.slice() : [];
    pasteTemplate = null;
    clipboardFacility = null;
    var hint = document.getElementById('drawHint');
    hint.classList.remove('show');
  }

  facilities.push(facility);
  saveData();
  renderAllFacilities();
  renderFacilityList();
  updateStats();

  cancelDraw();
  selectFacility(facility.id);
  showToast('护栏已添加，请在右侧面板填写设施信息', 'info');
}

function cancelDraw() {
  drawMode = null;
  drawPoints = [];
  pasteTemplate = null; // 取消时清空粘贴模板

  if (drawMouseMoveHandler) {
    map.off('mousemove', drawMouseMoveHandler);
    drawMouseMoveHandler = null;
  }

  document.getElementById('drawHint').classList.remove('show');
  var dfb = document.getElementById('drawFinishBtn');
  if (dfb) { dfb.style.display = 'none'; dfb.textContent = '完成绘制'; }

  if (map) {
    map.getContainer().style.cursor = '';
    map.doubleClickZoom.enable();
  }

  drawMarkers.forEach(function(m) { map.removeLayer(m); });
  drawMarkers = [];
  if (drawTempLayer) { map.removeLayer(drawTempLayer); drawTempLayer = null; }
}

// ============================================================
// 按长度完成绘制
// ============================================================
function finishByLength() {
  if (drawMode !== 'line' || drawPoints.length < 1) {
    showToast('请先点击地图放置至少一个节点', 'error');
    return;
  }

  var input = document.getElementById('targetLen');
  if (!input) {
    showToast('未在提示栏找到长度输入框，请重试', 'error');
    return;
  }
  var targetLen = parseFloat(input.value);
  if (!targetLen || targetLen <= 0) {
    showToast('请输入有效的目标长度（米）', 'error');
    input.focus();
    return;
  }

  if (drawPoints.length === 1) {
    // 只有起点：用当前地图中心点方向，或提示用户先点第二个点
    showToast('请先点击第二个节点定义方向，再按长度完成', 'info');
    return;
  }

  // 有至少2个点：调整最后一个点的位置，使最后一段等于目标长度
  var prevPt = drawPoints[drawPoints.length - 2];
  var lastPt = drawPoints[drawPoints.length - 1];
  var currentBearing = calcBearing(prevPt.lat, prevPt.lng, lastPt.lat, lastPt.lng);
  var newEnd = calcDestination(prevPt.lat, prevPt.lng, currentBearing, targetLen);

  // 更新最后一个点
  drawPoints[drawPoints.length - 1] = { lat: newEnd.lat, lng: newEnd.lng };

  // 更新地图上的临时标记和线段
  // 移除旧的最后一个标记
  var lastMarker = drawMarkers.pop();
  if (lastMarker) map.removeLayer(lastMarker);

  // 添加新位置的绿色标记
  var dLat = newEnd.lat, dLng = newEnd.lng;
  var marker = L.circleMarker([dLat, dLng], {
    radius: 8, fillColor: '#2ecc71', color: '#fff', weight: 2, fillOpacity: 0.95
  }).addTo(map);
  marker.bindTooltip('点击此处完成绘制', { direction: 'top', className: 'draw-finish-tip' });
  marker.on('click', function(e) { L.DomEvent.stopPropagation(e); if (drawPoints.length >= 2) finishDrawLine(); });
  drawMarkers.push(marker);

  // 更新临时线段
  if (drawTempLayer) map.removeLayer(drawTempLayer);
  var latlngs = drawPoints.map(function(p) { return [p.lat, p.lng]; });
  drawTempLayer = L.polyline(latlngs, { color: '#2980b9', weight: 5, dashArray: null, opacity: 0.85 }).addTo(map);

  showToast('已将最后一段调整为 ' + Math.round(targetLen) + ' 米', 'success');

  // 自动完成绘制
  setTimeout(function() { finishDrawLine(); }, 300);
}

// ============================================================
// 数据导入导出
// ============================================================
function exportData() {
  if (requirePerm('export', '导出数据')) return;
  var json = JSON.stringify(facilities, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '北海市交通设施台账_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出', 'success');
}

function importData() {
  if (requirePerm('import', '导入数据')) return;
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error('数据格式错误：需要数组');
        if (confirm('即将导入 ' + data.length + ' 条设施数据。\n确定将合并到现有数据中，取消将放弃导入。')) {
          facilities = facilities.concat(data);
          saveData();
          renderAllFacilities();
          renderFacilityList();
          updateStats();
          showToast('成功导入 ' + data.length + ' 条数据', 'success');
        }
      } catch(err) {
        showToast('导入失败：' + err.message, 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============================================================
function clearAllData() {
  if (facilities.length === 0) {
    // 即使内存里没有，也清一下localStorage确保干净
    localStorage.removeItem('bh_traffic_facilities_v2');
    showToast('当前没有数据', 'info');
    return;
  }
  if (!confirm('确定清空所有 ' + facilities.length + ' 条设施数据吗？此操作不可恢复！')) return;

  facilities = [];
  saveData();  // 这会写入空的[]
  renderAllFacilities();
  renderFacilityList();
  updateStats();

  // 关闭右侧面板
  document.getElementById('detailPanel').classList.remove('show');

  showToast('已清空所有数据', 'success');
}

// ============================================================
// 统计更新
// ============================================================
function updateStats() {
  var counts = { guardrail: 0, sign_single: 0, sign_cantilever: 0, signal: 0, column: 0 };
  // 护栏按类型统计长度
  var guardrailLen = { total: 0 };
  facilities.forEach(function(f) {
    if (f.status === 'removed') return;
    if (f.type === 'guardrail' && f.coordinates && f.coordinates.length >= 2) {
      counts.guardrail++;
      var len = 0;
      for (var i = 1; i < f.coordinates.length; i++) {
        len += map.distance([f.coordinates[i-1].lat, f.coordinates[i-1].lng], [f.coordinates[i].lat, f.coordinates[i].lng]);
      }
      guardrailLen.total += len;
      var mat = (f.attributes && f.attributes.material) || '';
      if (!mat) mat = '未分类';
      if (!guardrailLen[mat]) guardrailLen[mat] = 0;
      guardrailLen[mat] += len;
    } else if (counts[f.type] !== undefined) {
      counts[f.type]++;
    }
  });

  document.getElementById('statGuardrail').textContent = (guardrailLen.total > 1000 ? (guardrailLen.total / 1000).toFixed(2) + 'km' : Math.round(guardrailLen.total)) + 'm';

  // 护栏类型明细
  var typeHtml = [];
  Object.keys(guardrailLen).forEach(function(k) {
    if (k === 'total') return;
    var v = guardrailLen[k];
    typeHtml.push(k + ':<b>' + (v > 1000 ? (v/1000).toFixed(1)+'km' : Math.round(v)+'m') + '</b>');
  });
  if (typeHtml.length > 0) {
    var el = document.getElementById('statGuardrailTypes');
    el.style.display = '';
    el.innerHTML = '<span>' + typeHtml.join('</span><span>') + '</span>';
  }

  document.getElementById('statSignSingle').textContent = counts.sign_single;
  document.getElementById('statSignCan').textContent = counts.sign_cantilever;
  document.getElementById('statSignal').textContent = counts.signal;
  document.getElementById('statColumn').textContent = counts.column;
}

// ============================================================
// 键盘快捷键
// ============================================================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (clipboardFacility) { cancelPaste(); return; }
    if (drawMode) cancelDraw();
    if (document.getElementById('detailPanel').classList.contains('open')) closeDetail();
  }
  // 回车键也能完成线段绘制
  if (e.key === 'Enter' && drawMode === 'line' && drawPoints.length >= 2) {
    finishDrawLine();
  }
});

// ============================================================
// 初始化
// ============================================================
function init() {
  // 启动时先检查登录状态
  checkLogin();
}

// 页面加载后初始化
document.addEventListener('DOMContentLoaded', init);
</script>
