<section class="vote-section">
  <div class="container">

    <!-- 实名投票选人 -->
    <div style="max-width:700px;margin:0 auto 32px;padding:24px 28px;border-radius:16px;background:rgba(200,162,0,0.08);border:1px solid rgba(200,162,0,0.4);">
      <h3 style="color:var(--gold);margin-bottom:14px;font-size:16px;">👤 实名投票 — 请先选择您的姓名</h3>
      <select id="voter-name" style="width:100%;padding:12px 16px;border-radius:10px;background:rgba(10,20,40,0.9);border:1px solid rgba(200,162,0,0.4);color:#f0f4f8;font-size:15px;outline:none;cursor:pointer;margin-bottom:14px;">
        <option value="">— 请从名单中选择您的姓名 —</option>
      </select>
      <p style="font-size:13px;color:var(--text-muted);line-height:1.8;margin:0;">
        每个类别限投1票 · 已投票的候选人用金色标记 · 刷新后系统会记住已投票身份
      </p>
    </div>

    <!-- 最佳员工 -->
    <div class="vote-category">
      <div class="vote-category-title">
        <span>🌟</span> 最佳员工奖
        <span style="font-size:13px;color:var(--text-muted);font-weight:400;margin-left:auto">选出你心目中最优秀的振邦人</span>
      </div>
      <div class="vote-grid" id="best-employee">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 最佳团队 -->
    <div class="vote-category">
      <div class="vote-category-title">
        <span>👥</span> 优秀团队奖
        <span style="font-size:13px;color:var(--text-muted);font-weight:400;margin-left:auto">凝聚力最强的施工班组</span>
      </div>
      <div class="vote-grid" id="best-team">
      </div>
    </div>

    <!-- 提交按钮 -->
    <div class="vote-submit">
      <button class="btn-vote" onclick="submitVotes()">✨ 提交我的投票</button>
    </div>

  </div>
</section>

// ── 工具函数 ──────────────────────────────────────────
function genderEmoji(g) { return g === '女' ? '\u{1F469}' : '\u{1F468}'; }

// ── 状态 ─────────────────────────────────────────────
const myVotes = {};

// ── 候选数据（直接构建）──────────────────────────────
const CANDIDATES = {
  'best-employee': ALL_EMPLOYEES.map(e => ({
    name: e.name,
    role: e.role,
    emoji: genderEmoji(e.gender)
  })),
  'best-team': [
    {name:'护栏一队',role:'钢板护栏专项班组',emoji:'\u{1F528}'},
    {name:'标志二队',role:'标志标牌制作安装',emoji:'\u{1F527}'},
    {name:'标线三队',role:'道路标线施工班组',emoji:'\u{1F3A8}'},
    {name:'市政四队',role:'市政设施综合班组',emoji:'\u{1F3D7}'},
  ]
};

// ── 页面初始化 ────────────────────────────────────────
function init() {
  // 填充投票人下拉框
  const sel = document.getElementById('voter-name');
  ALL_EMPLOYEES.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.name;
    opt.textContent = e.name;
    sel.appendChild(opt);
  });
  renderVotes();
  
  // 页面加载时检查是否已投票
  checkAndUpdateUI();
}

// ── 检查用户投票状态 ────────────────────────────────────
async function checkAndUpdateUI() {
  const sel = document.getElementById('voter-name');
  if (!sel.value) return;
  
  try {
    const response = await fetch(`http://localhost:8900/api/check-voter/${encodeURIComponent(sel.value)}`);
    const result = await response.json();
    if (result.voted) {
      disableVoteUI('该人已投票过');
    }
  } catch (error) {
    console.log('提示: 后端服务未启动，本地投票功能正常');
  }
}

// ── 禁用投票界面 ────────────────────────────────────────
function disableVoteUI(msg) {
  document.querySelectorAll('.vote-card').forEach(card => {
    card.onclick = null;
    card.style.opacity = '0.5';
    card.style.cursor = 'not-allowed';
  });
  const btn = document.querySelector('.btn-vote');
  btn.disabled = true;
  btn.textContent = '❌ ' + msg;
  btn.style.opacity = '0.5';
}

// ── 启用投票界面 ────────────────────────────────────────
function enableVoteUI() {
  document.querySelectorAll('.vote-card').forEach((card, idx) => {
    const cat = card.parentElement.id;
    card.style.opacity = '1';
    card.style.cursor = 'pointer';
    card.onclick = () => vote(cat, idx);
  });
  const btn = document.querySelector('.btn-vote');
  btn.disabled = false;
  btn.textContent = '✨ 提交我的投票';
  btn.style.opacity = '1';
}

// ── 渲染投票卡片 ──────────────────────────────────────
function renderVotes() {
  Object.keys(CANDIDATES).forEach(cat => {
    const container = document.getElementById(cat);
    container.innerHTML = '';
    CANDIDATES[cat].forEach((c, idx) => {
      const voted = myVotes[cat] === idx;
      const card = document.createElement('div');
      card.className = 'vote-card' + (voted ? ' voted' : '');
      card.onclick = () => vote(cat, idx);
      card.innerHTML =
        '<div class="vote-avatar">' + c.emoji + '</div>' +
        '<div class="vote-name">' + c.name + '</div>' +
        '<div class="vote-role">' + c.role + '</div>' +
        '<div class="vote-count" style="font-size:12px;color:' + (voted ? 'var(--gold)' : 'var(--text-muted)') + '">' +
        (voted ? '&#10003; 已选' : '点击选择') + '</div>';
      container.appendChild(card);
    });
  });
}

// ── 点击投票 ──────────────────────────────────────────
function vote(cat, idx) {
  const voterName = document.getElementById('voter-name').value;
  if (!voterName) {
    alert('请先在顶部选择您的姓名，再进行投票！');
    document.getElementById('voter-name').focus();
    return;
  }
  // 如果已经投过这个类别，不允许重复投票
  if (myVotes[cat] !== undefined) {
    alert('您已经投过该类别，每个类别只能投票一次！');
    return;
  }
  myVotes[cat] = idx;
  renderVotes();
}

// ── 提交投票 ──────────────────────────────────────────
async function submitVotes() {
  const voterName = document.getElementById('voter-name').value;
  if (!voterName) {
    alert('请先选择您的姓名！');
    document.getElementById('voter-name').focus();
    return;
  }
  if (Object.keys(myVotes).length === 0) {
    alert('请至少投一票再提交！');
    return;
  }
  
  // 构建投票数据
  const voteData = {
    voter: voterName,
    best_employee: myVotes['best-employee'] !== undefined ? CANDIDATES['best-employee'][myVotes['best-employee']].name : null,
    best_team: myVotes['best-team'] !== undefined ? CANDIDATES['best-team'][myVotes['best-team']].name : null
  };
  
  // 提交到后端
  try {
    const response = await fetch('http://localhost:8900/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(voteData)
    });
    const result = await response.json();
    
    if (response.ok) {
      // 投票成功
      const catNames = {'best-employee':'最佳员工','best-team':'优秀团队'};
      const summary = Object.entries(myVotes)
        .map(([cat, idx]) => catNames[cat] + '：' + CANDIDATES[cat][idx].name)
        .join('<br>');
      const modal = document.getElementById('vote-modal');
      modal.querySelector('p').innerHTML =
        '<strong style="color:var(--gold); font-size: 16px;">✅ 投票成功！</strong><br><br>' +
        '<strong style="color:var(--gold)">' + voterName + '</strong> 的投票已提交<br><br>' +
        summary.split('<br>').map(s => '<span style="font-size:13px">&#10003; ' + s + '</span>').join('<br>') +
        '<br><br><span style="font-size:12px;color:var(--text-muted)">您已完成投票，刷新后无法重复投票<br><a href="stats.html" style="color:var(--gold);">📊 查看实时统计</a></span>';
      modal.classList.add('show');
      
      // 禁用投票界面
      disableVoteUI('已提交，感谢投票');
    } else {
      alert('❌ ' + result.error);
      if (result.voted) {
        disableVoteUI('该人已投票过');
      }
    }
  } catch (error) {
    console.error('提交投票失败:', error);
    alert('❌ 无法连接到投票服务器，请确保后端服务已启动！\n\n启动命令：npm install && node server.js');
  }
}

// ── 下拉框变化监听 ────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('voter-name');
  sel.addEventListener('change', async () => {
    myVotes['best-employee'] = undefined;
    myVotes['best-team'] = undefined;
    renderVotes();
    
    if (!sel.value) return;
    
    try {
      const response = await fetch(`http://localhost:8900/api/check-voter/${encodeURIComponent(sel.value)}`);
      const result = await response.json();
      if (result.voted) {
        disableVoteUI('该人已投票过');
      } else {
        enableVoteUI();
      }
    } catch (error) {
      console.log('提示: 后端服务未启动，本地投票功能正常');
      enableVoteUI();
    }
  });
});

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

init();
</script>
